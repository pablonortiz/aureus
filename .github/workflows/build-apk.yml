name: Build APK

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            android/.gradle
            android/app/build
          key: gradle-build-${{ hashFiles('android/app/build.gradle', 'android/gradle.properties', 'package-lock.json') }}
          restore-keys: gradle-build-

      - run: npm ci

      - run: cd android && ./gradlew assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: aureus-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
